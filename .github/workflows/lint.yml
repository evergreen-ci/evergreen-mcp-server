name: Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.13"

    - run: uv sync --frozen --extra dev

    - uses: pre-commit/action@v3.0.1
