repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        args: [--count, "--select=E9,F63,F7,F82", --show-source, --statistics]
